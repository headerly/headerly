pre-commit:
  commands:
    lint:
      glob: "*"
      run: "pnpm exec eslint --max-warnings 0 --fix --no-warn-ignored {staged_files}"
      stage_fixed: true
    typecheck:
      glob: "*.{ts,vue}"
      run: pnpm run typecheck
commit-msg:
  commands:
    commitlint:
      run: "pnpm exec commitlint --edit {1}"
